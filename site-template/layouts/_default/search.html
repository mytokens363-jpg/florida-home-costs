{{ define "main" }}
<style>
  .search-wrapper {
    max-width: 820px;
    margin: 48px auto;
    padding: 0 24px;
  }
  .search-heading {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--primary, #1a1a2e);
  }
  .search-subheading {
    color: #666;
    margin-bottom: 32px;
    font-size: 1.05rem;
  }
  .search-input-row {
    display: flex;
    align-items: center;
    border: 2px solid #d1d5db;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }
  .search-input-row:focus-within {
    border-color: #2563eb;
  }
  .search-icon {
    padding: 0 14px;
    font-size: 1.25rem;
    color: #9ca3af;
  }
  #search-input {
    border: none;
    outline: none;
    padding: 14px 0;
    font-size: 1.05rem;
    width: 100%;
    background: transparent;
  }
  .popular-tags {
    margin-bottom: 32px;
  }
  .popular-tags h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .popular-tags .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .popular-tags .tag {
    padding: 6px 14px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    font-size: 0.875rem;
    cursor: pointer;
    color: #374151;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
  }
  .popular-tags .tag:hover {
    background: #dbeafe;
    border-color: #93c5fd;
    color: #1d4ed8;
  }
  #search-results {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .result-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 20px 24px;
    text-decoration: none;
    display: block;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .result-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: #93c5fd;
  }
  .result-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .result-description {
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .result-tag {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .result-tag.category {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .result-tag.location {
    background: #dcfce7;
    color: #15803d;
  }
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
  }
  .no-results .no-results-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .no-results h3 {
    font-size: 1.1rem;
    color: #4b5563;
    margin-bottom: 6px;
  }
  .no-results p {
    font-size: 0.9rem;
  }
  .results-count {
    font-size: 0.875rem;
    color: #9ca3af;
    margin-bottom: 16px;
  }
</style>

<div class="search-wrapper">
  <h1 class="search-heading">Search Guides</h1>
  <p class="search-subheading">Find cost guides for any Florida home improvement project</p>

  <div class="search-input-row">
    <span class="search-icon">🔍</span>
    <input
      type="text"
      id="search-input"
      placeholder="Search by project, location, or topic..."
      autocomplete="off"
      autofocus
    />
  </div>

  <div class="popular-tags">
    <h3>Popular Searches</h3>
    <div class="tags">
      <a class="tag" href="#" data-query="roof replacement">Roof Replacement</a>
      <a class="tag" href="#" data-query="impact windows">Impact Windows</a>
      <a class="tag" href="#" data-query="HVAC">HVAC</a>
      <a class="tag" href="#" data-query="generator">Generator</a>
      <a class="tag" href="#" data-query="solar panels">Solar Panels</a>
      <a class="tag" href="#" data-query="Fort Lauderdale">Fort Lauderdale</a>
      <a class="tag" href="#" data-query="Miami">Miami</a>
      <a class="tag" href="#" data-query="Orlando">Orlando</a>
      <a class="tag" href="#" data-query="Tampa">Tampa</a>
      <a class="tag" href="#" data-query="Jacksonville">Jacksonville</a>
    </div>
  </div>

  <div class="results-count" id="results-count" style="display:none;"></div>
  <div id="search-results"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
  (function () {
    const SEARCH_INDEX_URL = "/index.json";
    const MAX_RESULTS = 20;

    let fuseInstance = null;
    let searchData = [];

    // Florida location keywords for tag classification
    const FLORIDA_LOCATIONS = [
      "miami", "orlando", "tampa", "jacksonville", "fort lauderdale",
      "naples", "sarasota", "gainesville", "tallahassee", "pensacola",
      "broward", "palm beach", "pinellas", "hillsborough", "orange county",
      "south florida", "central florida", "north florida"
    ];

    function isLocationTag(tagText) {
      const lower = tagText.toLowerCase();
      return FLORIDA_LOCATIONS.some(loc => lower.includes(loc));
    }

    function buildResultCard(item) {
      const card = document.createElement("a");
      card.href = item.url;
      card.className = "result-card";

      const titleEl = document.createElement("div");
      titleEl.className = "result-title";
      titleEl.textContent = item.title;

      const descEl = document.createElement("div");
      descEl.className = "result-description";
      descEl.textContent = item.description || item.content?.slice(0, 120) + "..." || "";

      const metaEl = document.createElement("div");
      metaEl.className = "result-meta";

      const allTags = [...(item.categories || []), ...(item.tags || [])];
      allTags.slice(0, 4).forEach(function (tag) {
        const tagEl = document.createElement("span");
        tagEl.className = "result-tag " + (isLocationTag(tag) ? "location" : "category");
        tagEl.textContent = tag;
        metaEl.appendChild(tagEl);
      });

      card.appendChild(titleEl);
      card.appendChild(descEl);
      card.appendChild(metaEl);
      return card;
    }

    function showNoResults(query) {
      const container = document.getElementById("search-results");
      container.innerHTML = "";
      const noResults = document.createElement("div");
      noResults.className = "no-results";
      noResults.innerHTML =
        '<div class="no-results-icon">🔍</div>' +
        "<h3>No guides found for &ldquo;" + query + "&rdquo;</h3>" +
        "<p>Try a different search term or browse by category above.</p>";
      container.appendChild(noResults);
    }

    function runSearch(query) {
      const trimmedQuery = query.trim();
      const container = document.getElementById("search-results");
      const countEl = document.getElementById("results-count");

      if (!trimmedQuery) {
        container.innerHTML = "";
        countEl.style.display = "none";
        return;
      }

      if (!fuseInstance) return;

      const results = fuseInstance.search(trimmedQuery, { limit: MAX_RESULTS });

      countEl.style.display = "block";

      if (results.length === 0) {
        countEl.textContent = "";
        showNoResults(trimmedQuery);
        return;
      }

      countEl.textContent = results.length + " guide" + (results.length !== 1 ? "s" : "") + " found";
      container.innerHTML = "";
      results.forEach(function (result) {
        container.appendChild(buildResultCard(result.item));
      });
    }

    function initFuse(data) {
      searchData = data;
      fuseInstance = new Fuse(data, {
        keys: [
          { name: "title", weight: 2.0 },
          { name: "categories", weight: 1.5 },
          { name: "tags", weight: 1.5 },
          { name: "description", weight: 1.0 },
          { name: "content", weight: 0.5 }
        ],
        threshold: 0.35,
        includeScore: true,
        ignoreLocation: true,
        minMatchCharLength: 2
      });

      // Run search if URL has ?q= param
      const urlParams = new URLSearchParams(window.location.search);
      const urlQuery = urlParams.get("q");
      if (urlQuery) {
        const inputEl = document.getElementById("search-input");
        inputEl.value = urlQuery;
        runSearch(urlQuery);
      }
    }

    // Load search index
    fetch(SEARCH_INDEX_URL)
      .then(function (response) { return response.json(); })
      .then(function (data) { initFuse(data); })
      .catch(function (err) { console.error("Failed to load search index:", err); });

    // Wire up input
    document.getElementById("search-input").addEventListener("input", function (event) {
      const query = event.target.value;
      // Update URL without reload
      const newUrl = query
        ? window.location.pathname + "?q=" + encodeURIComponent(query)
        : window.location.pathname;
      window.history.replaceState(null, "", newUrl);
      runSearch(query);
    });

    // Wire up popular search tags
    document.querySelectorAll(".popular-tags .tag").forEach(function (tagEl) {
      tagEl.addEventListener("click", function (event) {
        event.preventDefault();
        const query = tagEl.getAttribute("data-query");
        const inputEl = document.getElementById("search-input");
        inputEl.value = query;
        window.history.replaceState(null, "", window.location.pathname + "?q=" + encodeURIComponent(query));
        runSearch(query);
        inputEl.focus();
      });
    });
  })();
</script>
{{ end }}
