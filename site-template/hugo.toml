# Hugo site configuration — Florida Home Costs
# Theme: PaperMod (fast, SEO-optimized, clean)
# Install: git submodule add https://github.com/adityatelange/hugo-PaperMod themes/PaperMod

baseURL = "https://floridahomecosts.com/"
languageCode = "en-us"
title = "Florida Home Costs"
theme = "PaperMod"

# SEO defaults
enableRobotsTXT = true
enableGitInfo = true    # Uses git dates for lastmod

[params]
  description = "Real cost guides for Florida homeowners — roofing, HVAC, solar, permits, and more."
  author = "Florida Home Costs Editorial Team"
  env = "production"

  # SEO
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = true
  TocOpen = false

  # Schema markup for E-E-A-T
  ShowWordCount = true

[params.homeInfoParams]
  Title = "Florida Home Improvement Cost Guides"
  Content = "Accurate, research-backed cost guides for Florida homeowners. FBC codes, HVHZ requirements, permit costs — all covered."

# Taxonomy — categories map to content subdirectories
[taxonomies]
  category = "categories"
  tag = "tags"

# Sitemap — important for Google indexing
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Clean URLs (no .html extension)
[permalinks]
  posts = "/:sections/:slug/"

# Minify output
[minify]
  disableXML = false
  minifyOutput = true

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON needed for search

# Markup
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false  # Don't allow raw HTML in markdown (security)
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    noClasses = false
